name: docker_covid

services:

  # ── Backend FastAPI (inférence ML) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend/Dockerfile
    image: ${REGISTRY}/${GITHUB_USER}/covid-xray-backend:${IMAGE_TAG:-latest}
    container_name: covid-xray-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./backend/app:/app/app
      - ./shared:/app/shared:ro
      - ./tmp/logs:/app/tmp/logs
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - API_ENV=${API_ENV:-development}
      - MODEL_PATH=${MODEL_PATH:-data/models/best_model.keras}
      - LOG_SERVICE_URL=http://log-service:5002/v1/log
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - covid-net

  # ── Data Service (DVC + stats données) ────────────────────────────────────
  data-service:
    build:
      context: ./data-service
      dockerfile: Dockerfile
    image: ${REGISTRY}/${GITHUB_USER}/covid-xray-data-service:${IMAGE_TAG:-latest}
    container_name: covid-xray-data-service
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data
      - ./.dvc:/app/.dvc
      - ./.git:/app/.git:ro
      - ./tmp/logs:/app/tmp/logs
      - ./infrastructure/dvc_container_config.local:/app/.dvc/config.local:ro
      - ./shared:/app/shared:ro
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - DATA_SERVICE_PORT=5001
      - DVC_REMOTE_MINIO_ENDPOINTURL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_DEFAULT_REGION=us-east-1
      - LOG_SERVICE_URL=http://log-service:5002/v1/log
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - covid-net

  # ── Frontend Streamlit ─────────────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: infrastructure/${STREAMLIT_DOCKERFILE}
    image: ${STREAMLIT_IMAGE}:${IMAGE_TAG:-latest}
    container_name: ${STREAMLIT_CONTAINER_NAME:-covid-xray-streamlit}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./frontend:/app/frontend
    env_file: .env
    environment:
      - BACKEND_URL=http://backend:8000
      - DATA_SERVICE_URL=http://data-service:5001
    depends_on:
      backend:
        condition: service_healthy
      data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8501/_stcore/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks:
      - covid-net

  # ── Trainer (entraînement + MLflow logging) ────────────────────────────────
  trainer:
    build:
      context: .
      dockerfile: infrastructure/${TRAINER_DOCKERFILE}
    image: ${TRAINER_IMAGE}:${IMAGE_TAG:-latest}
    container_name: ${TRAINER_CONTAINER_NAME:-covid-xray-trainer}
    ports:
      - "${TRAINER_PORT:-8888}:8888"
    volumes:
      - ./data:/app/data
      - ./backend/src:/app/src
      - ./models:/app/models
      - ./outputs:/app/outputs
    env_file: .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    networks:
      - covid-net
    profiles:
      - training

  # ── MLflow Tracking Server ─────────────────────────────────────────────────
  mlflow:
    image: ${MLFLOW_IMAGE:-ghcr.io/mlflow/mlflow:v2.22.1}
    container_name: ${MLFLOW_CONTAINER_NAME:-mlflow-server}
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-mlflow}
      --default-artifact-root s3://${MLFLOW_BUCKET:-mlflow}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - covid-net

  # ── Log Service (agrégateur logs JSON) ────────────────────────────────────
  log-service:
    build:
      context: ./log-service
      dockerfile: Dockerfile
    container_name: covid-xray-log-service
    ports:
      - "5002:5002"
    volumes:
      - ./tmp/logs:/app/tmp/logs
    environment:
      - LOG_SERVICE_PORT=5002
      - LOG_DIR=/app/tmp/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    networks:
      - covid-net

  # ── PostgreSQL (MLflow backend) ────────────────────────────────────────────
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: ${POSTGRES_CONTAINER_NAME:-mlflow-postgres}
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-mlflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mlflow}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - covid-net

  # ── MinIO (DVC remote + MLflow artifacts) ─────────────────────────────────
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    container_name: ${MINIO_CONTAINER_NAME:-minio}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    networks:
      - covid-net

  # ── MinIO init (crée les buckets) ──────────────────────────────────────────
  minio-init:
    image: ${MINIO_CLIENT_IMAGE:-minio/mc:latest}
    container_name: ${MINIO_INIT_CONTAINER_NAME:-minio-init}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MLFLOW_BUCKET:-mlflow};
      mc mb --ignore-existing local/${DVC_BUCKET:-dvcstore};
      exit 0;
      "
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    networks:
      - covid-net

volumes:
  postgres-data:
  minio-data:

networks:
  covid-net:
    driver: bridge

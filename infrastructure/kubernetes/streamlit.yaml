apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds-covid-streamlit
  namespace: ds-covid
  labels:
    app: ds-covid-streamlit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ds-covid-streamlit
  template:
    metadata:
      labels:
        app: ds-covid-streamlit
    spec:
      containers:
        - name: streamlit
          image: ds-covid-streamlit:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          env:
            - name: BACKEND_URL
              value: "http://backend-service:8000"
          envFrom:
            - configMapRef:
                name: ds-covid-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          command:
            - streamlit
            - run
            - frontend/streamlit_app.py
            - --server.address=0.0.0.0
            - --server.port=8501
---
apiVersion: v1
kind: Service
metadata:
  name: streamlit-service
  namespace: ds-covid
spec:
  selector:
    app: ds-covid-streamlit
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ds-covid-backend
  namespace: ds-covid
  labels:
    app: ds-covid-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ds-covid-backend
  template:
    metadata:
      labels:
        app: ds-covid-backend
    spec:
      containers:
        - name: backend
          image: ds-covid-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ds-covid-config
            - secretRef:
                name: ds-covid-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: models
              mountPath: /app/data/models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: ds-covid
spec:
  selector:
    app: ds-covid-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP

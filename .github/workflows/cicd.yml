name: CI/CD

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "*.md"
      - "ARCHITECTURE_*.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "*.md"
      - "ARCHITECTURE_*.md"
      - "docs/**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: data-team-dst   # lowercase obligatoire pour docker pull

# ─────────────────────────────────────────────────────────────────────────────
# Graphe des jobs :
#
#  lint_be ─── test_be ──┐                    ┌── Build (backend)    ──┐
#                          ├── sonarcloud ─────┼── Build (frontend)   ──┼── deploy ── summary
#  lint_fe ─── test_fe ──┤   (matrix×3)       └── Build (data-service)──┘
#                          │
#  lint_ds ─── test_ds ──┘
#
#  deploy : pull images GHCR → docker run BE+DS → curl /health → cleanup
#  (dashboard → workflow séparé dashboard.yml, outil interne non prod)
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── LINT ─────────────────────────────────────────────────────────────────
  lint_be:
    name: "Lint BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install lint deps
        run: pip install -q ruff pylint

      - name: Ruff check (backend)
        run: ruff check backend/app/

      - name: Pylint backend
        run: pylint --fail-under=7 backend/app/ || true

  lint_fe:
    name: "Lint FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install lint deps
        run: pip install -q ruff

      - name: Ruff check (frontend)
        run: ruff check frontend/

  lint_ds:
    name: "Lint DS"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-service/requirements.txt

      - name: Install lint deps
        run: pip install -q ruff pylint

      - name: Ruff check (data-service)
        run: ruff check data-service/src/

      - name: Pylint data-service
        run: pylint --fail-under=7 data-service/src/ || true

  # ── TESTS ─────────────────────────────────────────────────────────────────
  test_be:
    name: "Test BE"
    runs-on: ubuntu-latest
    needs: lint_be
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -q -r backend/requirements-dev.txt

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest backend/tests/ \
            --cov=backend/app \
            --cov-report=xml:backend/be-cov.xml \
            --cov-report=term-missing \
            --cov-fail-under=25 \
            -v

      - name: Normalize coverage paths
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" backend/be-cov.xml

      - name: Upload BE coverage
        uses: actions/upload-artifact@v4
        with:
          name: be-coverage
          path: backend/be-cov.xml
          retention-days: 7

  test_fe:
    name: "Test FE"
    runs-on: ubuntu-latest
    needs: lint_fe
    # FE tests pas encore implementes -> ne bloque pas le pipeline
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - name: Install dependencies
        run: pip install -q -r frontend/requirements.txt

      - name: Run pytest (FE)
        run: |
          if find frontend/ -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest frontend/ \
              --cov=frontend \
              --cov-report=xml:fe-cov.xml \
              --cov-fail-under=10 \
              -v
          else
            echo "Aucun test FE trouve — creation d'un rapport vide"
            cat > fe-cov.xml << 'XML'
          <?xml version="1.0" ?>
          <coverage version="7.0" timestamp="" lines-valid="0" lines-covered="0"
                    line-rate="0" branches-covered="0" branches-valid="0"
                    branch-rate="0" complexity="0">
            <packages></packages>
          </coverage>
          XML
          fi

      - name: Normalize coverage paths
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" fe-cov.xml 2>/dev/null || true

      - name: Upload FE coverage
        uses: actions/upload-artifact@v4
        with:
          name: fe-coverage
          path: fe-cov.xml
          retention-days: 7

  test_ds:
    name: "Test DS"
    runs-on: ubuntu-latest
    needs: lint_ds
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: data-service/requirements.txt

      - name: Install dependencies
        run: |
          pip install -q -r data-service/requirements.txt \
                         -r data-service/dev-requirements.txt

      - name: Run pytest (data-service)
        run: |
          cd data-service && \
          PYTHONPATH=src:$GITHUB_WORKSPACE pytest tests/ \
            --cov=data_service \
            --cov-report=xml:ds-cov.xml \
            --cov-report=term-missing \
            --cov-fail-under=30 \
            -v

      - name: Normalize coverage paths
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" data-service/ds-cov.xml

      - name: Upload DS coverage
        uses: actions/upload-artifact@v4
        with:
          name: ds-coverage
          path: data-service/ds-cov.xml
          retention-days: 7

  # ── SONARCLOUD ────────────────────────────────────────────────────────────
  sonarcloud:
    name: "SonarCloud"
    runs-on: ubuntu-latest
    needs: [test_be, test_fe, test_ds]
    # SONAR_TOKEN doit etre configure dans :
    # GitHub repo > Settings > Secrets and variables > Actions > New repository secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # requis par SonarCloud pour l'historique git

      - name: Download BE coverage
        uses: actions/download-artifact@v4
        with:
          name: be-coverage

      - name: Download FE coverage
        uses: actions/download-artifact@v4
        with:
          name: fe-coverage
        continue-on-error: true  # FE optionnel

      - name: Download DS coverage
        uses: actions/download-artifact@v4
        with:
          name: ds-coverage
        continue-on-error: true

      - name: Prepare reports
        run: |
          mkdir -p reports
          [ -f be-cov.xml ] && mv be-cov.xml reports/ || true
          [ -f fe-cov.xml ] && mv fe-cov.xml reports/ || true
          [ -f ds-cov.xml ] && mv ds-cov.xml reports/ || true

      - name: Run SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Data-Team-DST_docker_covid
            -Dsonar.organization=data-team-dst-1
            -Dsonar.python.coverage.reportPaths=reports/be-cov.xml,reports/ds-cov.xml
            -Dsonar.sources=backend/app,frontend,data-service/src,dashboard
            -Dsonar.coverage.exclusions=**/tests/**,backend/src/notebooks/**,backend/src/test/**
            -Dsonar.python.version=3.11

  # ── BUILD & PUSH DOCKER (matrix) ─────────────────────────────────────────
  build:
    name: "Build (${{ matrix.service }})"
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: backend
            image: ghcr.io/data-team-dst/covid-xray-backend
            context: .
            dockerfile: infrastructure/docker/backend/Dockerfile
            build_args: ""
          - service: frontend
            image: ghcr.io/data-team-dst/covid-xray-streamlit
            context: .
            dockerfile: infrastructure/docker/streamlit/Dockerfile
            build_args: BASE_IMAGE=ghcr.io/data-team-dst/covid-xray-base:latest
          - service: data-service
            image: ghcr.io/data-team-dst/covid-xray-data-service
            context: data-service
            dockerfile: data-service/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PAT nécessaire pour puller covid-xray-base (frontend uniquement)
      - name: Log in to GHCR (pull base image)
        if: matrix.service == 'frontend'
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build_args }}

  # ── DEPLOY SMOKE-TEST ─────────────────────────────────────────────────────
  deploy:
    name: "Deploy smoke-test"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull & run backend
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          mkdir -p tmp/logs
          docker run -d --name smoke-backend \
            -p 8000:8000 \
            -e API_ENV=production \
            -e MODEL_PATH=data/models/best_model.keras \
            -e PYTHONUNBUFFERED=1 \
            -e LOG_SERVICE_URL=http://localhost:5002/v1/log \
            -v "${{ github.workspace }}/shared:/app/shared:ro" \
            -v "${{ github.workspace }}/tmp/logs:/app/tmp/logs" \
            "ghcr.io/${{ env.ORG }}/covid-xray-backend:sha-${SHORT_SHA}"

      - name: Pull & run data-service
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker run -d --name smoke-data-service \
            -p 5001:5001 \
            -e DATA_SERVICE_PORT=5001 \
            -e PYTHONUNBUFFERED=1 \
            -e LOG_SERVICE_URL=http://localhost:5002/v1/log \
            -v "${{ github.workspace }}/shared:/app/shared:ro" \
            -v "${{ github.workspace }}/tmp/logs:/app/tmp/logs" \
            "ghcr.io/${{ env.ORG }}/covid-xray-data-service:sha-${SHORT_SHA}"

      - name: Wait for services (max 90s)
        run: |
          for i in $(seq 1 18); do
            BE=$(curl -sf http://localhost:8000/health > /dev/null 2>&1 && echo ok || echo wait)
            DS=$(curl -sf http://localhost:5001/health > /dev/null 2>&1 && echo ok || echo wait)
            echo "backend=$BE  data-service=$DS  (${i}/18)"
            [ "$BE" = "ok" ] && [ "$DS" = "ok" ] && echo "✅ Both services up" && exit 0
            sleep 5
          done
          echo "❌ Timeout — services not ready after 90s"
          exit 1

      - name: Smoke-test backend /health
        run: |
          RESPONSE=$(curl -sf http://localhost:8000/health)
          echo "$RESPONSE" | grep -q '"status"' || (echo "❌ backend /health KO" && exit 1)
          echo "✅ backend GET /health OK"

      - name: Smoke-test backend /docs
        run: |
          curl -sf http://localhost:8000/docs > /dev/null
          echo "✅ backend GET /docs OK"

      - name: Smoke-test data-service /health
        run: |
          curl -sf http://localhost:5001/health > /dev/null
          echo "✅ data-service GET /health OK"

      - name: Debug — container logs on failure
        if: failure()
        run: |
          echo "=== smoke-backend ===" && docker logs smoke-backend 2>/dev/null || true
          echo "=== smoke-data-service ===" && docker logs smoke-data-service 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          docker stop smoke-backend smoke-data-service 2>/dev/null || true
          docker rm   smoke-backend smoke-data-service 2>/dev/null || true

  # ── SUMMARY ───────────────────────────────────────────────────────────────
  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - name: Write job summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          echo "### Images publiees sur GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag SHA | Tag branche |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| backend | \`sha-${SHORT_SHA}\` | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`sha-${SHORT_SHA}\` | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| data-service | \`sha-${SHORT_SHA}\` | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Le tag **sha-** est immutable. Le tag de branche suit le dernier push." >> $GITHUB_STEP_SUMMARY

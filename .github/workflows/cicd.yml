name: CI/CD

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "*.md"
      - "ARCHITECTURE_*.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "*.md"
      - "ARCHITECTURE_*.md"
      - "docs/**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

# ─────────────────────────────────────────────────────────────────────────────
# Graphe des jobs :
#
#  lint_be ─── test_be ──┐
#                         ├── sonarcloud ── build_be ──┐
#  lint_fe ─── test_fe ──┘                build_fe ──┘── summary
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── LINT ─────────────────────────────────────────────────────────────────
  lint_be:
    name: "Lint BE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/local.txt

      - name: Install lint deps
        run: pip install -q ruff pylint

      - name: Ruff check (backend)
        run: ruff check backend/app/

      - name: Pylint backend
        run: pylint --fail-under=7 backend/app/ || true

  lint_fe:
    name: "Lint FE"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/local.txt

      - name: Install lint deps
        run: pip install -q ruff

      - name: Ruff check (frontend)
        run: ruff check frontend/

  # ── TESTS ─────────────────────────────────────────────────────────────────
  test_be:
    name: "Test BE"
    runs-on: ubuntu-latest
    needs: lint_be
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/local.txt

      - name: Install dependencies
        run: pip install -q -r requirements/local.txt

      - name: Run pytest
        run: |
          pytest backend/tests/ \
            --cov=backend/app \
            --cov-report=xml:backend/be-cov.xml \
            --cov-report=term-missing \
            --cov-fail-under=25 \
            -v

      - name: Normalize coverage paths
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" backend/be-cov.xml

      - name: Upload BE coverage
        uses: actions/upload-artifact@v4
        with:
          name: be-coverage
          path: backend/be-cov.xml
          retention-days: 7

  test_fe:
    name: "Test FE"
    runs-on: ubuntu-latest
    needs: lint_fe
    # FE tests pas encore implementes -> ne bloque pas le pipeline
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/local.txt

      - name: Install dependencies
        run: pip install -q -r requirements/local.txt

      - name: Run pytest (FE)
        run: |
          if find frontend/ -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest frontend/ \
              --cov=frontend \
              --cov-report=xml:fe-cov.xml \
              --cov-fail-under=10 \
              -v
          else
            echo "Aucun test FE trouve — creation d'un rapport vide"
            cat > fe-cov.xml << 'XML'
          <?xml version="1.0" ?>
          <coverage version="7.0" timestamp="" lines-valid="0" lines-covered="0"
                    line-rate="0" branches-covered="0" branches-valid="0"
                    branch-rate="0" complexity="0">
            <packages></packages>
          </coverage>
          XML
          fi

      - name: Normalize coverage paths
        run: sed -i "s|${GITHUB_WORKSPACE}/||g" fe-cov.xml 2>/dev/null || true

      - name: Upload FE coverage
        uses: actions/upload-artifact@v4
        with:
          name: fe-coverage
          path: fe-cov.xml
          retention-days: 7

  # ── SONARCLOUD ────────────────────────────────────────────────────────────
  sonarcloud:
    name: "SonarCloud"
    runs-on: ubuntu-latest
    needs: [test_be, test_fe]
    # SONAR_TOKEN doit etre configure dans :
    # GitHub repo > Settings > Secrets and variables > Actions > New repository secret
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # requis par SonarCloud pour l'historique git

      - name: Download BE coverage
        uses: actions/download-artifact@v4
        with:
          name: be-coverage

      - name: Download FE coverage
        uses: actions/download-artifact@v4
        with:
          name: fe-coverage
        continue-on-error: true  # FE optionnel

      - name: Prepare reports
        run: |
          mkdir -p reports
          [ -f be-cov.xml ] && mv be-cov.xml reports/ || true
          [ -f fe-cov.xml ] && mv fe-cov.xml reports/ || true

      - name: Run SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Data-Team-DST_docker_covid
            -Dsonar.organization=data-team-dst-1
            -Dsonar.python.coverage.reportPaths=reports/be-cov.xml
            -Dsonar.sources=backend/app,frontend,src
            -Dsonar.coverage.exclusions=**/tests/**,src/notebooks/**,src/test/**
            -Dsonar.python.version=3.11

  # ── BUILD & PUSH DOCKER (parallele BE + FE) ──────────────────────────────
  build_be:
    name: "Build BE"
    runs-on: ubuntu-latest
    needs: sonarcloud
    # Build sur push uniquement (pas sur PR)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tagging automatique : sha-abc1234 (unique) + branche + latest sur main
      # -> pas de conflit possible entre membres de l'equipe
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build_fe:
    name: "Build FE"
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR (push images)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR_TOKEN = PAT avec read:packages pour puller covid-xray-base (autre repo de l'org)
      # continue-on-error : si secret absent ou image publique, on continue sans echec
      - name: Log in to GHCR (pull base image)
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/streamlit/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=ghcr.io/data-team-dst/covid-xray-base:latest

  # ── SUMMARY ───────────────────────────────────────────────────────────────
  summary:
    name: "Summary"
    runs-on: ubuntu-latest
    needs: [build_be, build_fe]
    if: github.event_name == 'push'
    steps:
      - name: Write job summary
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="${{ github.ref_name }}"
          echo "### Images publiees sur GHCR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag SHA | Tag branche |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| backend | \`sha-${SHORT_SHA}\` | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend | \`sha-${SHORT_SHA}\` | \`${BRANCH}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Le tag **sha-** est immutable. Le tag de branche suit le dernier push." >> $GITHUB_STEP_SUMMARY

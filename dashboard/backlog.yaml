    duration: "5 semaines"
    deadline: "2026-04-24"
    points: 26
    status: in_progress
    stories:
      - id: US-11
        title: "CI/CD pipeline complet (lint → test → build → push → deploy)"
        description: "GitHub Actions : lint + test → sonarcloud → build/push GHCR → deploy smoke-test (docker run + curl /health). CI < 10 min. 100% vert sur main."
        depends_on: ["US-13", "US-14"]
        points: 5
        priority: MUST
        done: false
      - id: US-12
        title: "Sécurité API : authentification + rate limiting"
        description: "API key obligatoire sur tous les endpoints (401 si absent). Rate limiting (ex: 100 req/min). Validation Pydantic stricte sur /predict (type, taille image). 0 endpoint non authentifié exposé."
        blocks: ["US-15"]
        points: 5
        priority: MUST
        done: false
      - id: US-13
        title: "Log-service centralisé + logs structurés JSON tous services"
        description: "Microservice log-service (FastAPI :5002) : POST /v1/log reçoit les logs de tous les services, GET /v1/logs?service=X pour requêter. Chaque service garde son propre tmp/logs/{service}.log (local) ET envoie au log-service (central). setup_logging(service_name='backend') suffit — non-bloquant, fallback local si log-service down. OpenAPI /docs backend documenté avec exemples 200/400/401/503."
        branch: us-13-steven
        assignee: Steven
        blocks: ["US-11", "US-14"]
        points: 4
        priority: MUST
        done: false
